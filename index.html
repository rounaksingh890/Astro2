<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>ASTRÆA — Chart the Cosmos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#0a1130; --bg1:#04050d;
    --ink:#eef1ff; --mut:#9aa3cf; --faint:#646c98;
    --glow:#8ea2ff; --star:#f2f4ff;
    --accent:#f3c168; --accent2:#ffd98a;
    --panel:rgba(8,11,26,0.72); --hair:rgba(142,162,255,0.16);
    --display:'Fraunces',Georgia,'Times New Roman',serif;
    --ui:'Space Grotesk',-apple-system,system-ui,sans-serif;
    --tint:#8ea2ff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg1);color:var(--ink)}
  body{font-family:var(--ui);font-weight:300;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;position:fixed;inset:0;touch-action:none}
  ::selection{background:rgba(243,193,104,0.25)}

  canvas#space{position:fixed;inset:0;z-index:0;display:block;opacity:0;transition:opacity 1.6s ease}
  body.lit canvas#space{opacity:1}
  .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(120% 90% at 50% 42%,rgba(0,0,0,0) 38%,rgba(2,3,9,0.55) 100%)}

  svg#hub{position:fixed;inset:0;z-index:3;width:100%;height:100%;overflow:visible;opacity:0;visibility:hidden;transition:opacity .7s ease,visibility .7s}
  svg#hub.show{opacity:1;visibility:visible}
  #hub .spoke{stroke:rgba(142,162,255,0.26);stroke-width:1;fill:none;transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)}
  #hub .node{cursor:pointer;opacity:0;transform:scale(.3);transform-box:fill-box;transform-origin:center;transition:opacity .7s ease,transform .85s cubic-bezier(.34,1.45,.5,1)}
  #hub .node.lit{opacity:1;transform:scale(1)}
  #hub .node .glow{fill:var(--glow)}
  #hub .node .halo{fill:none;stroke:rgba(142,162,255,0.55);stroke-width:1}
  #hub .node .core{fill:var(--star)}
  #hub .node .glyph{fill:#0a1130;font-family:var(--ui);font-weight:400}
  #hub .node .lab{fill:var(--ink);font-family:var(--ui);font-weight:400;letter-spacing:.04em}
  #hub .node .gl{fill:var(--glow);font-family:var(--ui);font-weight:300;letter-spacing:.22em;text-transform:uppercase;opacity:0;transition:opacity .4s}
  #hub .node:hover .glow,#hub .node:focus-visible .glow{opacity:.34!important}
  #hub .node:hover .halo,#hub .node:focus-visible .halo{stroke:var(--glow)}
  #hub .node:hover .gl,#hub .node:focus-visible .gl{opacity:.85}
  #hub .node:focus-visible{outline:none}
  #hub .node:focus-visible .lab{fill:var(--accent2)}
  #hub .node.accent .glow{fill:var(--accent)}
  #hub .node.accent .halo{stroke:var(--accent)}
  #hub .node.accent .core{fill:var(--accent2)}
  #hub .node.accent .glyph{fill:#2a1c05}
  #hub .node.accent .lab{fill:var(--accent2)}
  #hub .node.accent .gl{fill:var(--accent)}
  #hub .glow{animation:np 4.5s ease-in-out infinite}
  @keyframes np{0%,100%{opacity:.15}50%{opacity:.26}}

  .top{position:fixed;top:0;left:0;right:0;z-index:7;display:flex;align-items:center;justify-content:space-between;padding:max(22px,env(safe-area-inset-top,0px)) 30px 18px;pointer-events:none;opacity:0;transition:opacity 1s ease}
  body.lit .top{opacity:1}
  .top>*{pointer-events:auto}
  .lead-l{display:flex;align-items:center;gap:13px;min-width:0}
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer;background:none;border:none;color:inherit}
  .brand .s{font-size:15px;color:var(--accent)}
  .brand .n{font-family:var(--ui);font-weight:400;letter-spacing:.4em;font-size:12px;color:var(--ink)}
  .back{display:none;align-items:center;gap:10px;background:none;border:none;color:var(--mut);cursor:pointer;font-family:var(--ui);font-weight:300;font-size:11px;letter-spacing:.2em;text-transform:uppercase;transition:color .3s}
  .back:hover{color:var(--ink)}
  .back .ar{font-size:15px;display:inline-block;transition:transform .3s}
  .back:hover .ar{transform:translateX(-3px)}
  body[data-scene]:not([data-scene="hub"]) .brand{display:none}
  body[data-scene]:not([data-scene="hub"]) .back{display:flex}

  .tools{display:flex;align-items:center;gap:13px}
  .pill{font-family:var(--ui);font-weight:400;letter-spacing:.16em;font-size:11px;text-transform:uppercase;color:#2a1c05;text-decoration:none;cursor:pointer;border:none;background:linear-gradient(180deg,var(--accent2),var(--accent));padding:11px 22px;border-radius:40px;box-shadow:0 8px 28px -12px var(--accent);transition:transform .35s,box-shadow .35s}
  .pill:hover{transform:translateY(-1px);box-shadow:0 14px 34px -12px var(--accent)}
  body[data-scene="book"] .pill{display:none}
  .snd{width:38px;height:38px;border-radius:50%;border:1px solid var(--hair);background:rgba(142,162,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .35s}
  .snd:hover{border-color:rgba(142,162,255,0.4)}
  .snd svg{width:16px;height:16px;stroke:var(--mut);fill:none;stroke-width:1.4}
  .snd .wv{opacity:0;transition:opacity .3s}.snd.on .wv{opacity:1}.snd.on svg{stroke:var(--glow)}

  .hint{position:fixed;left:50%;bottom:max(30px,env(safe-area-inset-bottom,0px));transform:translateX(-50%);z-index:6;display:flex;align-items:center;gap:11px;font-family:var(--ui);font-weight:300;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--mut);opacity:0;transition:opacity .7s;white-space:nowrap}
  body.lit[data-scene="hub"] .hint{opacity:.9}
  body:not([data-scene="hub"]) .hint{opacity:0;pointer-events:none}
  .hint .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px 1px var(--accent);animation:hp 2.4s ease-in-out infinite}
  @keyframes hp{0%,100%{opacity:.4}50%{opacity:1}}

  .scene{position:fixed;z-index:5;background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--hair);overflow-y:auto;-webkit-overflow-scrolling:touch;opacity:0;visibility:hidden;outline:none}
  @media (min-width:861px){
    .scene{top:0;right:0;bottom:0;width:min(560px,46vw);border-top:none;border-right:none;border-bottom:none;transform:translateX(40px);transition:opacity .7s ease,transform .8s cubic-bezier(.2,.7,.2,1),visibility .7s}
    .scene.show{opacity:1;visibility:visible;transform:translateX(0)}
    .grip{display:none}
  }
  @media (max-width:860px){
    .scene{left:0;right:0;bottom:0;top:auto;height:min(60vh,560px);border-radius:26px 26px 0 0;border-bottom:none;transform:translateY(50px);transition:opacity .6s ease,transform .7s cubic-bezier(.2,.7,.2,1),visibility .6s}
    .scene.show{opacity:1;visibility:visible;transform:translateY(0)}
    .grip{width:38px;height:4px;border-radius:4px;background:rgba(142,162,255,0.32);margin:11px auto 2px}
  }
  .scene .inr{padding:34px 40px 50px}
  @media (max-width:860px){.scene .inr{padding:8px 24px calc(40px + env(safe-area-inset-bottom,0px))}}

  .eye{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .eye .g{font-size:17px;color:var(--tint);transition:color .5s}
  .eye .e{font-family:var(--ui);font-weight:400;font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--mut)}
  .title{font-family:var(--display);font-weight:300;font-size:clamp(29px,4.4vw,42px);line-height:1.05;letter-spacing:-.01em;margin-bottom:16px}
  .title em{font-style:italic;color:var(--accent2)}
  .lead{font-family:var(--ui);font-weight:300;font-size:14.5px;line-height:1.72;color:rgba(238,241,255,0.76);margin-bottom:24px}
  .lead strong{color:var(--ink);font-weight:400}
  .steps{list-style:none;margin:0 0 24px}
  .steps li{display:flex;gap:17px;padding:14px 0;border-top:1px solid var(--hair)}
  .steps li:last-child{border-bottom:1px solid var(--hair)}
  .steps .n{font-family:var(--display);font-size:16px;color:var(--accent);min-width:20px}
  .steps b{display:block;font-family:var(--display);font-weight:400;font-size:18px;color:var(--ink);margin-bottom:2px}
  .steps p{font-family:var(--ui);font-weight:300;font-size:12.5px;color:var(--mut);line-height:1.5}
  .stats{display:flex;gap:32px;margin-bottom:6px;flex-wrap:wrap}
  .stats .v{font-family:var(--display);font-weight:400;font-size:29px;color:var(--accent2);line-height:1}
  .stats .k{font-family:var(--ui);font-weight:300;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin-top:6px}
  .rlist{list-style:none;margin:0 0 22px}
  .rlist li{padding:15px 0;border-top:1px solid var(--hair);display:flex;justify-content:space-between;align-items:baseline;gap:16px}
  .rlist li:last-child{border-bottom:1px solid var(--hair)}
  .rlist .t{font-family:var(--display);font-weight:400;font-size:20px;color:var(--ink)}
  .rlist .d{font-family:var(--ui);font-weight:300;font-size:12px;color:var(--mut);text-align:right;max-width:19ch}
  .tiers{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
  .tier{border:1px solid var(--hair);border-radius:14px;padding:16px 18px;position:relative;display:flex;align-items:center;justify-content:space-between;gap:14px;transition:border-color .3s,transform .3s}
  .tier:hover{border-color:var(--tint);transform:translateX(3px)}
  .tier.feat{border-color:rgba(243,193,104,0.4);background:rgba(243,193,104,0.05)}
  .tier .nm{font-family:var(--ui);font-weight:400;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut)}
  .tier .ds{font-family:var(--ui);font-weight:300;font-size:12.5px;color:rgba(238,241,255,0.66);margin-top:5px}
  .tier .pr{font-family:var(--display);font-weight:400;font-size:30px;color:var(--accent2);line-height:1;white-space:nowrap}
  .tier .badge{position:absolute;top:-9px;left:16px;font-family:var(--ui);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:#2a1c05;background:var(--accent);padding:3px 8px;border-radius:20px}
  .quote{border-left:1px solid rgba(243,193,104,0.4);padding-left:19px;margin-bottom:18px}
  .quote p{font-family:var(--display);font-style:italic;font-weight:300;font-size:18px;line-height:1.45;color:rgba(238,241,255,0.88)}
  .quote span{font-family:var(--ui);font-weight:300;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin-top:9px;display:block}
  .rating{display:flex;align-items:center;gap:10px;font-family:var(--ui);font-weight:300;font-size:12px;color:var(--mut)}
  .rating .st{color:var(--accent);letter-spacing:.12em;font-size:14px}
  .now{margin-bottom:6px}
  .now .date{font-family:var(--ui);font-weight:300;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:10px}
  .now .phase{font-family:var(--display);font-weight:400;font-size:30px;color:var(--ink);line-height:1.05}
  .now .illum{font-family:var(--ui);font-weight:300;font-size:12.5px;color:var(--accent2);margin-top:6px}
  .now .note{font-family:var(--display);font-style:italic;font-weight:300;font-size:18px;line-height:1.5;color:rgba(238,241,255,0.82);border-top:1px solid var(--hair);padding-top:20px;margin-top:20px}
  .form{margin-bottom:6px}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media (max-width:430px){.frow{grid-template-columns:1fr}}
  .field{margin-bottom:15px}
  .field label{display:block;font-family:var(--ui);font-weight:300;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);margin-bottom:6px}
  .field input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--hair);color:var(--ink);font-family:var(--display);font-size:18px;font-weight:300;padding:6px 2px;transition:border-color .3s}
  .field input::placeholder{color:var(--faint)}
  .field input:focus{outline:none;border-color:var(--accent)}
  .fmsg{font-family:var(--display);font-style:italic;font-weight:300;font-size:19px;color:var(--accent2);line-height:1.45;opacity:0;height:0;overflow:hidden;transition:opacity .5s}
  .fmsg.show{opacity:1;height:auto;margin-top:4px}
  .contact{margin-top:22px;display:flex;gap:22px;flex-wrap:wrap}
  .contact a{font-family:var(--ui);font-weight:300;font-size:12px;color:var(--mut);text-decoration:none;border-bottom:1px solid var(--hair);padding-bottom:3px;transition:color .3s,border-color .3s;cursor:pointer}
  .contact a:hover{color:var(--accent2);border-color:var(--accent)}
  .cta{margin-top:4px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .btn{display:inline-block;font-family:var(--ui);font-weight:400;font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;cursor:pointer;border-radius:40px;border:1px solid transparent;transition:all .4s}
  .btn.solid{background:linear-gradient(180deg,var(--accent2),var(--accent));color:#2a1c05;padding:14px 30px;box-shadow:0 8px 28px -12px var(--accent)}
  .btn.solid:hover{transform:translateY(-2px);box-shadow:0 14px 34px -12px var(--accent)}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--hair);padding:14px 24px}
  .btn.ghost:hover{border-color:var(--tint)}
  .flash{position:fixed;inset:0;z-index:8;pointer-events:none;opacity:0;background:radial-gradient(circle at 50% 46%,var(--tint),transparent 70%)}
  .flash.fire{animation:fl .6s ease-out}
  @keyframes fl{0%{opacity:0}18%{opacity:.85}100%{opacity:0}}
  .cover{position:fixed;inset:0;z-index:30;background:var(--bg1);display:flex;align-items:center;justify-content:center;transition:opacity 1s ease}
  .cover.hide{opacity:0;pointer-events:none}
  .cover .cl{font-family:var(--display);font-style:italic;font-weight:300;font-size:17px;color:var(--mut);letter-spacing:.02em;opacity:0;animation:cf 2.4s ease forwards}
  @keyframes cf{0%{opacity:0}35%{opacity:1}100%{opacity:.65}}
  @media (max-width:860px){.top{padding-left:22px;padding-right:22px}.pill{padding:9px 16px;font-size:10px}.hint{font-size:10px;letter-spacing:.22em}}
  @media (prefers-reduced-motion:reduce){.hint .dot,#hub .glow{animation:none}.flash.fire{animation:none}canvas#space{transition:none}}
</style>
</head>
<body data-scene="hub">
<canvas id="space"></canvas>
<div class="vignette"></div>
<svg id="hub" aria-label="Star chart"></svg>

<div class="top">
  <div class="lead-l">
    <button class="brand" id="brandBtn" aria-label="ASTRÆA home"><span class="s">✶</span><span class="n">ASTRÆA</span></button>
    <button class="back" id="backBtn"><span class="ar">←</span> Star map</button>
  </div>
  <div class="tools">
    <button class="snd" id="snd" aria-label="Toggle ambient sound" title="Ambient sound">
      <svg viewBox="0 0 24 24"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path class="wv" d="M16 8.5a4 4 0 0 1 0 7"/><path class="wv" d="M18.5 6a7 7 0 0 1 0 12"/></svg>
    </button>
    <button class="pill" data-travel="book">Book a reading</button>
  </div>
</div>

<div class="hint" id="hint"><span class="dot"></span>Tap a star to travel</div>

<div class="scene" id="scene" role="dialog" aria-modal="false" tabindex="-1">
  <div class="grip"></div>
  <div class="inr" id="sceneInr"></div>
</div>

<div class="flash" id="flash"></div>
<div class="cover" id="cover"><div class="cl">Charting the cosmos…</div></div>

<script>
(function(){
  "use strict";
  var REDUCED = matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
  var IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
  var SVGNS='http://www.w3.org/2000/svg';
  var DPR=Math.min(window.devicePixelRatio||1,2);
  var TAU=Math.PI*2, RAD=Math.PI/180;
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function lerp(a,b,t){return a+(b-a)*t;}
  function rng(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function hx(h){h=h.replace('#','');return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)];}

  var NODES=[
    {id:'about',    label:'The Astrologer', kicker:'About',     glyph:'☽', clock:210, rad:1.02, size:7,   tint:'#9fb0ff'},
    {id:'readings', label:'What I Read',    kicker:'Readings',  glyph:'✶', clock:150, rad:1.08, size:7,   tint:'#b9a6f5'},
    {id:'offerings',label:'Offerings',      kicker:'Pricing',   glyph:'◈', clock:-30, rad:1.08, size:7,   tint:'#74d6c4'},
    {id:'today',    label:"Today's Sky",    kicker:'Right now', glyph:'☾', clock:30,  rad:1.0,  size:6.5, tint:'#7fb0ff'},
    {id:'voices',   label:'Voices',         kicker:'Clients',   glyph:'\u201C', clock:90, rad:0.9, size:6.5, tint:'#e9bfa6'},
    {id:'book',     label:'Book a Reading', kicker:'Reserve',   glyph:'✦', clock:-90, rad:1.04, size:8.5, tint:'#f3c168', accent:true}
  ];
  var NODEMAP={}; NODES.forEach(function(n){NODEMAP[n.id]=n;});

  var cv=document.getElementById('space'), ctx=cv.getContext('2d');
  var W,H,cx,cy,R,portrait,minD;
  var s3=[], neb=null;
  var body={x:0,y:0,r:0}, deco={};

  function newStar(z){
    var pk=Math.random(), col;
    if(pk>0.92)col=[255,221,150]; else if(pk>0.82)col=[170,190,255]; else col=[238,242,255];
    return {x:(Math.random()*2-1),y:(Math.random()*2-1),z:z<=0?1:z,col:col,tw:Math.random()*TAU,sp:Math.random()*1.4+0.4};
  }
  function buildStars(){ s3=[]; var n=clamp((W*H)/4200,160,520); for(var i=0;i<n;i++) s3.push(newStar(Math.random())); }
  function buildNeb(){
    neb=document.createElement('canvas');neb.width=W;neb.height=H;var n=neb.getContext('2d');
    function blob(x,y,rr,col){var g=n.createRadialGradient(x,y,0,x,y,rr);g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');n.fillStyle=g;n.fillRect(0,0,W,H);}
    blob(W*0.2,H*0.28,minD*1.5,'rgba(86,68,180,0.15)');
    blob(W*0.84,H*0.72,minD*1.6,'rgba(46,86,176,0.13)');
    blob(W*0.62,H*0.16,minD*1.1,'rgba(210,160,90,0.06)');
    blob(W*0.5,H*0.92,minD*1.3,'rgba(70,58,150,0.11)');
  }

  var svg=document.getElementById('hub');
  function S(t,a,p){var e=document.createElementNS(SVGNS,t);for(var k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e;}
  var hubG=S('g',{id:'hubG'},svg);
  NODES.forEach(function(nd){nd.spoke=S('line',{'class':'spoke','stroke-linecap':'round'},hubG);});
  NODES.forEach(function(nd){
    var g=S('g',{'class':'node'+(nd.accent?' accent':''),'tabindex':'0','role':'button','aria-label':nd.label+' — '+nd.kicker},hubG);
    nd.glow=S('circle',{'class':'glow'},g);
    nd.halo=S('circle',{'class':'halo'},g);
    nd.core=S('circle',{'class':'core'},g);
    nd.gel=S('text',{'class':'glyph','text-anchor':'middle','dominant-baseline':'central'},g);nd.gel.textContent=nd.glyph;
    nd.lel=S('text',{'class':'lab','text-anchor':'middle'},g);nd.lel.textContent=nd.label;
    nd.kel=S('text',{'class':'gl','text-anchor':'middle'},g);nd.kel.textContent=nd.kicker;
    nd.el=g;
    g.addEventListener('click',function(){if(!drag.moved)travel(nd.id);});
    g.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();travel(nd.id);}});
  });

  function layout(){
    W=window.innerWidth;H=window.innerHeight;portrait=H>=W;minD=Math.min(W,H);
    cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W/2;cy=H*(portrait?0.435:0.5);
    R=clamp(minD*0.345,120,250);
    svg.setAttribute('viewBox','0 0 '+W+' '+H);
    var lf=clamp(R/210,0.84,1.16);
    NODES.forEach(function(nd){
      var a=nd.clock*RAD;

      '<div class="contact"><a data-noop>hello@astraea.co</a><a data-noop>Instagram</a><a data-noop>+1 (000) 000-0000</a></div>';}
  };

  var scene='hub';
  var sceneEl=document.getElementById('scene'), sceneInr=document.getElementById('sceneInr'), flashEl=document.getElementById('flash');
  function showHub(){ scene='hub'; document.body.setAttribute('data-scene','hub'); svg.classList.add('show'); sceneEl.classList.remove('show'); }
  function showDest(id){
    scene=id; document.body.setAttribute('data-scene',id);
    sceneInr.innerHTML=C[id]();
    svg.classList.remove('show'); sceneEl.classList.add('show'); sceneEl.scrollTop=0;
    bindScene();
    try{sceneEl.focus({preventScroll:true});}catch(e){}
  }
  function bindScene(){
    var f=document.getElementById('bf');
    if(f)f.addEventListener('submit',function(e){e.preventDefault();var m=document.getElementById('fm');f.querySelector('button[type=submit]').style.display='none';f.querySelectorAll('.field,.frow').forEach(function(el){el.style.display='none';});m.classList.add('show');chime('book');});
    sceneInr.querySelectorAll('[data-travel]').forEach(function(a){a.addEventListener('click',function(e){e.preventDefault();travel(a.getAttribute('data-travel'));});});
    sceneInr.querySelectorAll('[data-noop]').forEach(function(a){a.addEventListener('click',function(e){e.preventDefault();});});
  }

  function travel(to){
    if(warping||to===scene)return;
    killHint(); setTint(to==='hub'?'#8ea2ff':NODEMAP[to].tint);
    if(REDUCED){ if(to==='hub')showHub(); else showDest(to); chime(to); return; }
    warping=true; warpStart=performance.now();
    svg.classList.remove('show'); sceneEl.classList.remove('show');
    whoosh();
    setTimeout(function(){ if(to==='hub')showHub(); else showDest(to); },860);
    setTimeout(function(){ flashEl.classList.remove('fire'); void flashEl.offsetWidth; flashEl.classList.add('fire'); },1040);
    setTimeout(function(){ chime(to); },1200);
    setTimeout(function(){ warping=false; },1520);
  }

  document.getElementById('backBtn').addEventListener('click',function(){travel('hub');});
  document.getElementById('brandBtn').addEventListener('click',function(){if(scene!=='hub')travel('hub');});
  document.querySelector('.pill').addEventListener('click',function(e){e.preventDefault();travel('book');});
  window.addEventListener('keydown',function(e){if(e.key==='Escape'&&scene!=='hub')travel('hub');});

  var hinted=false; function killHint(){hinted=true;}
  svg.addEventListener('pointerdown',function(){setTimeout(function(){if(drag.moved)killHint();},120);});

  var actx=null,master=null,on=false,noiseBuf=null,NOTE={hub:330,about:261.63,readings:293.66,offerings:329.63,today:392.0,voices:440.0,book:523.25};
  function initAudio(){if(actx)return;try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
    master=actx.createGain();master.gain.value=0;master.connect(actx.destination);
    var f=actx.createBiquadFilter();f.type='lowpass';f.frequency.value=440;f.connect(master);
    function osc(ty,fr,gv,dt){var o=actx.createOscillator();o.type=ty;o.frequency.value=fr;if(dt)o.detune.value=dt;var g=actx.createGain();g.gain.value=gv;o.connect(g).connect(f);o.start();}
    osc('sine',98,0.5,0);osc('sine',147,0.22,4);osc('triangle',49,0.4,0);
    var lfo=actx.createOscillator();lfo.frequency.value=0.05;var lg=actx.createGain();lg.gain.value=130;lfo.connect(lg).connect(f.frequency);lfo.start();
    var len=Math.floor(actx.sampleRate*1.2);noiseBuf=actx.createBuffer(1,len,actx.sampleRate);var d=noiseBuf.getChannelData(0);for(var i=0;i<len;i++)d[i]=Math.random()*2-1;
  }
  function chime(id){if(!actx||!on)return;var fr=NOTE[id]||392;var t=actx.currentTime;
    [0,7].forEach(function(semi,k){var o=actx.createOscillator();o.type='sine';o.frequency.value=fr*Math.pow(2,semi/12);var g=actx.createGain();g.gain.value=0;o.connect(g).connect(master);g.gain.linearRampToValueAtTime(0.06-k*0.02,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+1.6);o.start(t);o.stop(t+1.7);});}
  function whoosh(){if(!actx||!on||!noiseBuf)return;var src=actx.createBufferSource();src.buffer=noiseBuf;var bp=actx.createBiquadFilter();bp.type='bandpass';bp.Q.value=1.2;var g=actx.createGain();g.gain.value=0;src.connect(bp).connect(g).connect(master);var t=actx.currentTime;bp.frequency.setValueAtTime(300,t);bp.frequency.exponentialRampToValueAtTime(2600,t+0.5);bp.frequency.exponentialRampToValueAtTime(200,t+1.1);g.gain.linearRampToValueAtTime(0.12,t+0.2);g.gain.linearRampToValueAtTime(0.0001,t+1.15);src.start(t);src.stop(t+1.2);}
  var sndBtn=document.getElementById('snd');
  sndBtn.addEventListener('click',function(){initAudio();if(!actx)return;if(actx.state==='suspended')actx.resume();on=!on;sndBtn.classList.toggle('on',on);master.gain.linearRampToValueAtTime(on?0.06:0,actx.currentTime+1.0);});

  function ignite(){
    document.body.classList.add('lit');
    NODES.forEach(function(nd,i){setTimeout(function(){nd.lit=true;nd.el.classList.add('lit');nd.spoke.style.strokeDashoffset='0';},540+i*165);});
    setTimeout(function(){svg.classList.add('show');},420);
  }

  layout();
  window.addEventListener('resize',layout);
  requestAnimationFrame(render);

  var booted=false;
  function boot(){if(booted)return;booted=true;document.getElementById('cover').classList.add('hide');
    if(REDUCED){document.body.classList.add('lit');svg.classList.add('show');NODES.forEach(function(nd){nd.lit=true;nd.el.classList.add('lit');nd.spoke.style.strokeDashoffset='0';});}
    else ignite();
  }
  if(document.readyState==='complete')setTimeout(boot,1500);
  else window.addEventListener('load',function(){setTimeout(boot,1200);});
  setTimeout(boot,3200);
})();
</script>
</body>
</html>
